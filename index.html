<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KELEXIA | 赛博空间站</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #00f2ff;
            --secondary: #7000ff;
            --accent: #ff007a;
            --bg: #0a0a0c;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }

        body {
            background: var(--bg);
            color: #fff;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* 动态流体背景 */
        .background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(45deg, #0a0a0c, #1a1a2e);
            overflow: hidden;
        }

        .blob {
            position: absolute;
            width: 500px;
            height: 500px;
            background: linear-gradient(135deg, var(--secondary), var(--accent));
            filter: blur(80px);
            border-radius: 50%;
            opacity: 0.3;
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(-10%, -10%) scale(1); }
            to { transform: translate(20%, 20%) scale(1.2); }
        }

        /* 核心卡片 */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 3rem;
            max-width: 800px;
            width: 90%;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
            transition: transform 0.3s ease;
        }

        .glass-card:hover {
            transform: translateY(-5px);
            border-color: rgba(0, 242, 255, 0.3);
        }

        /* 头像/名称区 */
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px var(--primary);
            margin-bottom: 1.5rem;
            object-fit: cover;
        }

        h1 {
            font-size: 2.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to right, #00f2ff, #7000ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .tagline {
            color: #888;
            font-style: italic;
            margin-bottom: 2rem;
        }

        /* 技能标签 */
        .skills {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2.5rem;
        }

        .skill-tag {
            background: rgba(255, 255, 255, 0.05);
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: default;
        }

        .skill-tag:hover {
            background: var(--primary);
            color: #000;
            box-shadow: 0 0 15px var(--primary);
            transform: scale(1.1);
        }

        /* 链接按钮 */
        .links {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .link-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent);
            color: var(--accent);
        }

        /* 底部信息 */
        .footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="background">
        <div class="blob"></div>
        <div class="blob" style="right: -10%; bottom: -10%; background: linear-gradient(135deg, var(--primary), var(--secondary));"></div>
    </div>

    <div class="glass-card">
        <img src="https://github.com/identicons/kelexia.png" alt="Avatar" class="avatar">
        
        <h1>KELEXIA</h1>
        <p class="tagline">"在 0 与 1 的荒原里，我是一把燃烧的火炬。"</p>

        <div class="skills">
            <div class="skill-tag">RTX 4090D Powered</div>
            <div class="skill-tag">ComfyUI Artisan</div>
            <div class="skill-tag">WSL2 Master</div>
            <div class="skill-tag">Python Automation</div>
            <div class="skill-tag">Docker Containerization</div>
        </div>

        <div class="links">
            <a href="https://github.com/你的用户名" class="link-btn">
                <i class="fab fa-github"></i> GitHub
            </a>
            <a href="#" class="link-btn">
                <i class="fas fa-terminal"></i> Workflows
            </a>
            <a href="#" class="link-btn">
                <i class="fas fa-envelope"></i> Contact
            </a>
            <a href="#" class="link-btn">
                <i class="fas fa-brain"></i> AI Models
            </a>
        </div>

        <div class="footer">
            &copy; 2026 KELEXIA. Built with ⚡ and Pure Aesthetics.
        </div>
    </div>

</body>
</html>
